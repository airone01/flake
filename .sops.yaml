keys:
  # master backup key
  - &backup age1gh0a3deq5u57vz655w659lspx3x3jk4p2p6tv0w3t9lzm57pkfwslwa9za
  # hosts
  - &cassiopeia age15ptmy54dcgrz7aa5k6jjutgrkj9x8cfcecnmy6uqkp2l7m5muvzskdtsnf
  - &hercules age1ndfm0f6pmhu9gy7us8j39n5zd0985vtvaqz24dktua895gzkvvzs54fhsn
  - &cetus age1lw73ydjttuaxyzlx6tez8jcxakt62yxf5q84swk6ut6sq36p3qqqra67v3
  - &lyra age1u27xlvk5slpyeryp7h5st6surn87rvlz0zsjvr9utn0p98kjw43qf68dql
creation_rules:
  # Anubis key: both Cetus (gitea/searchix Anubis) and Hercules (website Anubis) need it
  - path_regex: secrets/anubis\.yaml$
    key_groups:
      - age:
          - *backup
          - *cetus
          - *hercules
  # Gitea DB password: stays on Cetus only
  - path_regex: secrets/gitea\.yaml$
    key_groups:
      - age:
          - *backup
          - *cetus
  - path_regex: secrets/hercules-ci\.yaml$
    key_groups:
      - age:
          - *backup
          - *cetus
          - *hercules
  # WireGuard private keys: each host only decrypts its own
  - path_regex: secrets/wireguard-hercules\.yaml$
    key_groups:
      - age:
          - *backup
          - *hercules
  - path_regex: secrets/wireguard-cetus\.yaml$
    key_groups:
      - age:
          - *backup
          - *cetus
